<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>محرر الفيديو الاحترافي</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- مكتبة PDF.js لمعالجة ملفات الـ PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <!-- مكتبة Tesseract.js للذكاء الاصطناعي والتعرف على اتجاه النصوص (OSD) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.3/tesseract.min.js"></script>
    
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }

        .overlay-blur { backdrop-filter: blur(5px); }
        
        .clip-item { transition: all 0.2s; cursor: pointer; border: 2px solid transparent; }
        .clip-item:hover { border-color: #4b5563; }
        .clip-item.active { border-color: #6366f1; background-color: #374151; }
        
        .custom-radio:checked + label {
            background-color: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }

        input[type=range] { accent-color: #4f46e5; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col h-screen overflow-hidden relative">

    <!-- شريط العنوان -->
    <header class="bg-gray-800 border-b border-gray-700 p-3 flex justify-between items-center z-10 shrink-0 shadow-md">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-xl shadow-lg">
                <i class="fa-solid fa-film"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold">محرر الفيديو الاحترافي</h1>
                <p class="text-[10px] text-gray-400">قص، تدوير ذكي للنصوص، ودمج مع الصوت</p>
            </div>
        </div>
        <button id="exportBtn" class="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg text-sm font-bold transition flex items-center gap-2 shadow-lg">
            <i class="fa-solid fa-download"></i> <span class="hidden sm:inline">حفظ الفيديو</span>
        </button>
    </header>

    <main class="flex-grow flex flex-col lg:flex-row overflow-hidden">
        
        <!-- مساحة العرض (Canvas) -->
        <section class="w-full h-[40vh] min-h-[250px] lg:h-auto lg:flex-1 flex flex-col items-center justify-center p-4 bg-black relative shrink-0">
            
            <!-- شاشة التصدير مع نسبة مئوية والمشاركة -->
            <div id="exportOverlay" class="absolute inset-0 bg-black/95 z-50 hidden flex-col items-center justify-center text-center p-6 overlay-blur">
                
                <!-- واجهة التحميل -->
                <div id="processingUI" class="flex flex-col items-center w-full max-w-xs">
                    <i class="fa-solid fa-gear fa-spin text-5xl text-indigo-500 mb-4"></i>
                    <h2 class="text-2xl font-bold text-white mb-4">جاري صناعة الفيديو...</h2>
                    
                    <div class="w-full bg-gray-700 rounded-full h-4 mb-2 overflow-hidden border border-gray-600 shadow-inner">
                        <div id="exportProgressBar" class="bg-indigo-500 h-4 rounded-full transition-all duration-300 ease-out" style="width: 0%"></div>
                    </div>
                    <p id="exportProgressText" class="text-2xl font-bold text-indigo-300 mb-4 drop-shadow-md">0%</p>
                    
                    <p class="text-gray-400 text-sm">يرجى البقاء في هذه الصفحة وعدم إغلاق الشاشة.</p>
                </div>

                <!-- واجهة الانتهاء -->
                <div id="doneUI" class="hidden flex-col items-center w-full max-w-xs">
                    <i class="fa-solid fa-circle-check text-6xl text-emerald-500 mb-4 drop-shadow-lg"></i>
                    <h2 class="text-2xl font-bold text-white mb-6">اكتمل صنع الفيديو!</h2>
                    
                    <div class="flex flex-col gap-3 w-full">
                        <button id="finalDownloadBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded-lg font-bold flex justify-center items-center gap-2 transition shadow-lg">
                            <i class="fa-solid fa-download"></i> حفظ في الهاتف
                        </button>
                        <button id="finalShareBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-lg font-bold flex justify-center items-center gap-2 transition shadow-lg hidden">
                            <i class="fa-brands fa-whatsapp text-xl"></i> مشاركة وإرسال
                        </button>
                    </div>
                    <button id="finalCloseBtn" class="mt-6 text-gray-400 hover:text-white underline text-sm transition">إغلاق</button>
                </div>

            </div>

            <!-- HD Canvas -->
            <div class="relative w-full max-w-4xl aspect-video bg-gray-800 rounded-lg overflow-hidden shadow-2xl border border-gray-700 flex items-center justify-center">
                <canvas id="previewCanvas" width="1280" height="720" class="w-full h-full object-contain"></canvas>
                
                <div id="emptyStateMsg" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none bg-gray-800 p-4 text-center">
                    <i id="emptyIcon" class="fa-regular fa-images text-6xl text-gray-600 mb-4"></i>
                    <p id="emptyText" class="text-gray-400">الشاشة فارغة، أضف صوراً أو مقاطع من القائمة</p>
                </div>
            </div>

            <!-- أزرار التشغيل -->
            <div class="mt-4 flex items-center gap-4 bg-gray-800 p-2 rounded-full border border-gray-700 shadow-lg px-4">
                <button id="playBtn" class="w-10 h-10 bg-indigo-600 hover:bg-indigo-500 rounded-full flex items-center justify-center text-lg transition">
                    <i class="fa-solid fa-play ml-1"></i>
                </button>
                <button id="stopBtn" class="w-10 h-10 bg-gray-700 hover:bg-gray-600 rounded-full flex items-center justify-center text-lg transition hidden">
                    <i class="fa-solid fa-stop"></i>
                </button>
                <div class="h-6 w-px bg-gray-600 mx-1"></div>
                <div class="text-sm font-mono text-gray-300 w-16 text-center" id="timeDisplay">00:00</div>
            </div>
        </section>

        <!-- الشريط الجانبي (إضافة وسائط والشريط الزمني) -->
        <section class="w-full lg:w-[380px] flex-1 lg:flex-none bg-gray-800 border-t lg:border-t-0 lg:border-r border-gray-700 flex flex-col overflow-y-auto">
            
            <div class="p-4 border-b border-gray-700 bg-gray-800 shrink-0 z-20 shadow-md">
                
                <!-- أزرار الرفع -->
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <label class="bg-gray-700 hover:bg-gray-600 cursor-pointer p-3 rounded-lg flex flex-col items-center gap-2 transition border border-dashed border-gray-500">
                        <i class="fa-solid fa-file-pdf text-indigo-400 text-xl"></i>
                        <span class="text-[10px] font-bold text-center">صور / فيديو / PDF</span>
                        <input type="file" id="mediaInput" accept="image/*,video/*,.pdf" multiple class="hidden">
                    </label>
                    
                    <label class="bg-gray-700 hover:bg-gray-600 cursor-pointer p-3 rounded-lg flex flex-col items-center gap-2 transition border border-dashed border-gray-500 relative" id="audioUploadContainer">
                        <i class="fa-solid fa-music text-pink-400 text-xl"></i>
                        <span class="text-xs font-bold text-center w-full truncate px-2">موسيقى خارجية</span>
                        <input type="file" id="audioInput" accept="audio/*" class="hidden">
                        <button id="removeAudioBtn" class="absolute -top-2 -right-2 bg-red-500 w-6 h-6 rounded-full hidden items-center justify-center text-xs shadow-lg hover:bg-red-600">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </label>
                </div>

                <!-- زر تفعيل التدوير التلقائي (OCR) -->
                <div class="bg-gray-900 p-3 rounded-lg border border-gray-700 mb-3 cursor-pointer hover:bg-gray-800 transition" onclick="document.getElementById('autoOcrRotate').click()">
                    <label class="flex items-start gap-3 cursor-pointer pointer-events-none">
                        <input type="checkbox" id="autoOcrRotate" class="mt-1 w-4 h-4 text-indigo-500 bg-gray-800 border-gray-600 rounded pointer-events-auto">
                        <div class="flex flex-col">
                            <span class="text-xs font-bold text-gray-300">التدوير الذكي التلقائي للصور</span>
                            <span class="text-[10px] text-gray-500 mt-1">يقوم بتحليل النصوص لتعديل اتجاه المستندات المقلوبة تلقائياً عند إضافتها (قد يستغرق وقتاً أطول).</span>
                        </div>
                    </label>
                </div>

                <!-- إعدادات الصوت العامة -->
                <div class="bg-gray-900 p-3 rounded-lg border border-gray-700 mb-3">
                    <h4 class="text-xs font-bold text-gray-400 mb-2"><i class="fa-solid fa-volume-high ml-1"></i> إعدادات الصوت</h4>
                    <div class="flex items-center w-full text-xs">
                        <input type="radio" name="audioMode" id="modeMusicOnly" value="musicOnly" class="hidden custom-radio" checked>
                        <label for="modeMusicOnly" class="flex-1 text-center py-2 border border-gray-600 rounded-r-md cursor-pointer transition text-gray-300 bg-gray-800">
                            الموسيقى فقط
                        </label>
                        <input type="radio" name="audioMode" id="modeMix" value="mix" class="hidden custom-radio">
                        <label for="modeMix" class="flex-1 text-center py-2 border-y border-l border-gray-600 rounded-l-md cursor-pointer transition text-gray-300 bg-gray-800">
                            دمج الكل
                        </label>
                    </div>
                </div>

                <!-- إعدادات دقة تصدير الفيديو -->
                <div class="bg-gray-900 p-3 rounded-lg border border-gray-700">
                    <h4 class="text-xs font-bold text-gray-400 mb-2"><i class="fa-solid fa-display ml-1"></i> الدقة (Resolution)</h4>
                    <select id="resolutionSelect" class="w-full bg-gray-800 text-white border border-gray-600 rounded-lg p-2 text-xs focus:ring-indigo-500 outline-none">
                        <option value="480">SD (854x480) - حجم صغير للمشاركة</option>
                        <option value="720" selected>HD (1280x720) - متوازن</option>
                        <option value="1080">FHD (1920x1080) - جودة عالية</option>
                    </select>
                </div>

            </div>

            <!-- الشريط الزمني (Timeline) -->
            <div class="flex-grow p-4 flex flex-col gap-2" id="timelineContainer">
                <div class="text-center text-gray-500 text-sm mt-8" id="emptyTimelineMsg">
                    <i class="fa-solid fa-arrow-up block text-2xl mb-2 opacity-50"></i>
                    أضف ملفات وابدأ المونتاج
                </div>
            </div>

        </section>
    </main>

    <!-- نافذة تعديل المقطع (Modal) -->
    <div id="clipSettingsModal" class="fixed inset-0 bg-black/80 z-50 hidden items-center justify-center overlay-blur p-4">
        <div class="bg-gray-800 border border-gray-700 rounded-xl shadow-2xl w-full max-w-sm overflow-hidden flex flex-col">
            <div class="bg-gray-900 p-4 border-b border-gray-700 flex justify-between items-center">
                <h3 class="font-bold text-lg"><i class="fa-solid fa-sliders ml-2 text-indigo-400"></i> إعدادات المقطع</h3>
                <button id="closeModalBtn" class="text-gray-400 hover:text-white transition"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-5 flex flex-col gap-5">
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-2">القص والابعاد:</label>
                    <div class="flex items-center w-full text-xs">
                        <input type="radio" name="clipFitMode" id="clipCover" value="cover" class="hidden custom-radio">
                        <label for="clipCover" class="flex-1 text-center py-2 border border-gray-600 rounded-r-md cursor-pointer transition text-gray-300 bg-gray-800">
                            قص الزوائد
                        </label>
                        <input type="radio" name="clipFitMode" id="clipContain" value="contain" class="hidden custom-radio">
                        <label for="clipContain" class="flex-1 text-center py-2 border-y border-gray-600 cursor-pointer transition text-gray-300 bg-gray-800">
                            احتواء
                        </label>
                        <input type="radio" name="clipFitMode" id="clipStretch" value="stretch" class="hidden custom-radio">
                        <label for="clipStretch" class="flex-1 text-center py-2 border-y border-l border-gray-600 rounded-l-md cursor-pointer transition text-gray-300 bg-gray-800">
                            تمطيط
                        </label>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between text-xs font-bold text-gray-400 mb-2">
                        <label>تكبير / تصغير (Zoom):</label>
                        <span id="zoomValueDisplay">100%</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-magnifying-glass-minus text-gray-500"></i>
                        <input type="range" id="clipZoomInput" min="0.5" max="3" step="0.1" value="1" class="flex-grow h-2 bg-gray-600 rounded-lg appearance-none cursor-pointer">
                        <i class="fa-solid fa-magnifying-glass-plus text-gray-500"></i>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-2">التدوير:</label>
                    <div class="flex gap-2">
                        <button id="clipRotateBtn" class="flex-1 bg-gray-700 hover:bg-gray-600 border border-gray-600 text-white py-2 rounded-lg transition flex items-center justify-center gap-2 text-xs">
                            <i class="fa-solid fa-rotate-right"></i> يدوياً (90°)
                        </button>
                        <button id="clipAutoRotateBtn" class="flex-1 bg-indigo-700 hover:bg-indigo-600 border border-indigo-600 text-white py-2 rounded-lg transition flex items-center justify-center gap-2 text-xs" title="تحليل النص لتصحيح الاتجاه تلقائياً">
                            <i class="fa-solid fa-wand-magic-sparkles"></i> تدوير ذكي
                        </button>
                    </div>
                </div>
                <div id="durationControlGroup">
                    <label class="block text-xs font-bold text-gray-400 mb-2">المدة (ثواني):</label>
                    <input type="number" id="clipDurationInput" min="1" max="60" class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg p-2 text-center">
                </div>
            </div>
            <div class="bg-gray-900 p-4 border-t border-gray-700 flex gap-3">
                <button id="saveModalBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white py-2 rounded-lg font-bold transition">تم التعديل</button>
                <button id="deleteClipBtn" class="bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-lg font-bold transition" title="حذف المقطع"><i class="fa-solid fa-trash"></i></button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        
        let defaultWidth = 1280;
        let defaultHeight = 720;
        canvas.width = defaultWidth;
        canvas.height = defaultHeight;

        let timeline = []; 
        let backgroundAudio = null; 
        let isPlaying = false;
        let isExporting = false;
        let currentAnimationId = null;
        let exportMediaRecorder = null;
        let exportChunks = [];
        let editingIndex = -1;

        let audioCtx;
        let destStream;

        // UI Elements
        const mediaInput = document.getElementById('mediaInput');
        const audioInput = document.getElementById('audioInput');
        const resolutionSelect = document.getElementById('resolutionSelect');
        const autoOcrRotateCheckbox = document.getElementById('autoOcrRotate');
        
        const timelineContainer = document.getElementById('timelineContainer');
        const emptyTimelineMsg = document.getElementById('emptyTimelineMsg');
        const emptyStateMsg = document.getElementById('emptyStateMsg');
        const emptyIcon = document.getElementById('emptyIcon');
        const emptyText = document.getElementById('emptyText');
        
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const timeDisplay = document.getElementById('timeDisplay');
        const exportBtn = document.getElementById('exportBtn');
        
        const exportOverlay = document.getElementById('exportOverlay');
        const processingUI = document.getElementById('processingUI');
        const doneUI = document.getElementById('doneUI');
        const exportProgressBar = document.getElementById('exportProgressBar');
        const exportProgressText = document.getElementById('exportProgressText');
        
        const finalDownloadBtn = document.getElementById('finalDownloadBtn');
        const finalShareBtn = document.getElementById('finalShareBtn');
        const finalCloseBtn = document.getElementById('finalCloseBtn');
        let finalVideoBlob = null;
        let finalVideoExt = '';

        // Modal Elements
        const modal = document.getElementById('clipSettingsModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const saveModalBtn = document.getElementById('saveModalBtn');
        const deleteClipBtn = document.getElementById('deleteClipBtn');
        const clipFitRadios = document.getElementsByName('clipFitMode');
        const clipZoomInput = document.getElementById('clipZoomInput');
        const zoomValueDisplay = document.getElementById('zoomValueDisplay');
        const clipRotateBtn = document.getElementById('clipRotateBtn');
        const clipAutoRotateBtn = document.getElementById('clipAutoRotateBtn');
        const clipDurationInput = document.getElementById('clipDurationInput');
        const durationControlGroup = document.getElementById('durationControlGroup');

        function getAudioMode() { return document.querySelector('input[name="audioMode"]:checked').value; }
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        // --- دالة اكتشاف اتجاه النص وإصلاحه ---
        async function getSmartRotation(imageElement) {
            let worker = null;
            try {
                // 1. تحويل الصورة إلى Canvas لتجنب مشاكل الوصول والأمان (CORS / Blob) داخل الـ Web Worker
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = imageElement.videoWidth || imageElement.width || 800;
                tempCanvas.height = imageElement.videoHeight || imageElement.height || 800;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.drawImage(imageElement, 0, 0, tempCanvas.width, tempCanvas.height);

                // 2. استخدام الدالة الصحيحة لاكتشاف اتجاه المستندات (OSD)
                worker = await Tesseract.createWorker('osd');
                const result = await worker.detect(tempCanvas);
                
                await worker.terminate();
                worker = null;
                
                let deg = 0;
                if (result && result.data && typeof result.data.orientation_degrees === 'number') {
                    deg = result.data.orientation_degrees;
                    console.log("تم اكتشاف زاوية الدوران بواسطة الذكاء الاصطناعي:", deg);
                }
                
                if (deg !== 0) {
                    // إذا كان النص مائلاً بمقدار 90 درجة، يجب تدوير الشاشة بمقدار 270 (360 - 90) لتعديله
                    return (360 - deg) % 360;
                }
                return 0;
            } catch (e) {
                console.error("فشل الذكاء الاصطناعي في تحديد الاتجاه:", e);
                if (worker) await worker.terminate();
                return 0;
            }
        }

        // تغيير الدقة
        resolutionSelect.addEventListener('change', (e) => {
            const res = e.target.value;
            if (res === '480') { defaultWidth = 854; defaultHeight = 480; }
            else if (res === '720') { defaultWidth = 1280; defaultHeight = 720; }
            else if (res === '1080') { defaultWidth = 1920; defaultHeight = 1080; }
            canvas.width = defaultWidth; canvas.height = defaultHeight;
            redrawCurrentOrFirst();
        });

        // دالة الرسم الأساسية
        function drawMedia(ctx, item, cw, ch) {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, cw, ch);
            
            const img = item.element;
            const rot = item.rotation || 0;
            const scale = item.scale || 1.0;
            const mode = item.fitMode || 'cover';

            let iw = img.videoWidth || img.width;
            let ih = img.videoHeight || img.height;
            if (!iw || !ih) return;

            let calcW = iw; let calcH = ih;
            if (rot === 90 || rot === 270) { calcW = ih; calcH = iw; }

            let drawW, drawH;
            if (mode === 'stretch') {
                if (rot === 90 || rot === 270) { drawW = ch; drawH = cw; } 
                else { drawW = cw; drawH = ch; }
            } else {
                const hRatio = cw / calcW; const vRatio = ch / calcH;
                const ratio = mode === 'cover' ? Math.max(hRatio, vRatio) : Math.min(hRatio, vRatio);
                drawW = iw * ratio; drawH = ih * ratio;
            }

            drawW *= scale; drawH *= scale;

            ctx.save();
            ctx.translate(cw / 2, ch / 2);
            ctx.rotate(rot * Math.PI / 180);
            ctx.drawImage(img, -drawW / 2, -drawH / 2, drawW, drawH);
            ctx.restore();
        }

        function redrawCurrentOrFirst() {
            if (isPlaying || timeline.length === 0) {
                ctx.fillStyle = '#000'; ctx.fillRect(0,0,defaultWidth,defaultHeight);
                return;
            }
            const idx = editingIndex >= 0 ? editingIndex : 0;
            drawMedia(ctx, timeline[idx], defaultWidth, defaultHeight);
        }

        function initAudioSystem() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                destStream = audioCtx.createMediaStreamDestination();
            }
        }

        // معالجة الرفع
        mediaInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            
            const isAutoOcr = autoOcrRotateCheckbox.checked;

            // إظهار التحميل
            emptyStateMsg.style.display = 'flex';
            emptyIcon.className = "fa-solid fa-spinner fa-spin text-6xl text-indigo-500 mb-4";
            emptyText.innerText = isAutoOcr ? "جاري المعالجة وتحليل النصوص للتدوير..." : "جاري المعالجة...";

            for (let file of files) {
                const id = Date.now() + Math.random().toString();
                const defaultSettings = { scale: 1, fitMode: 'stretch' }; // تمطيط للجميع
                
                try {
                    if (file.type === 'application/pdf') {
                        const arrayBuffer = await file.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                        for (let i = 1; i <= pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const viewport = page.getViewport({ scale: 2.0 });
                            const tempCanvas = document.createElement('canvas');
                            tempCanvas.width = viewport.width; tempCanvas.height = viewport.height;
                            const tempCtx = tempCanvas.getContext('2d');
                            await page.render({ canvasContext: tempCtx, viewport: viewport }).promise;
                            
                            const dataUrl = tempCanvas.toDataURL('image/jpeg', 0.9);
                            const img = new Image(); img.src = dataUrl;
                            await new Promise(r => img.onload = r);
                            
                            let rot = 0;
                            if (isAutoOcr) {
                                emptyText.innerText = `تحليل صفحة ${i}...`;
                                rot = await getSmartRotation(img);
                            }
                            
                            timeline.push({ id: id+i, type: 'image', name: `صفحة ${i} - ${file.name.substring(0,6)}`, element: img, duration: 4, url: dataUrl, rotation: rot, ...defaultSettings });
                        }
                    } else if (file.type.startsWith('image/')) {
                        const url = URL.createObjectURL(file);
                        const img = new Image(); img.src = url;
                        await new Promise(r => img.onload = r);
                        
                        let rot = 0;
                        if (isAutoOcr) {
                            emptyText.innerText = `تحليل اتجاه الصورة...`;
                            rot = await getSmartRotation(img);
                        }
                        
                        timeline.push({ id, type: 'image', name: file.name, element: img, duration: 4, url, rotation: rot, ...defaultSettings });
                    } else if (file.type.startsWith('video/')) {
                        const url = URL.createObjectURL(file);
                        const vid = document.createElement('video'); vid.src = url; vid.crossOrigin = "anonymous"; vid.playsInline = true; vid.muted = true; 
                        await new Promise(r => vid.onloadedmetadata = r);
                        timeline.push({ id, type: 'video', name: file.name, element: vid, duration: vid.duration, url, rotation: 0, ...defaultSettings });
                    }
                } catch (err) { console.error("Error processing file", err); alert(`حدث خطأ أثناء قراءة الملف: ${file.name}`); }
            }
            
            emptyStateMsg.style.display = 'none';
            emptyIcon.className = "fa-regular fa-images text-6xl text-gray-600 mb-4";
            emptyText.innerText = "الشاشة فارغة، أضف صوراً أو مقاطع";

            renderTimelineUI();
            if (!isPlaying && timeline.length > 0) { editingIndex = timeline.length - 1; redrawCurrentOrFirst(); }
            mediaInput.value = '';
        });

        audioInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            const audio = new Audio(url); await new Promise(r => audio.onloadedmetadata = r);
            backgroundAudio = { name: file.name, element: audio, duration: audio.duration, url };
            document.getElementById('audioUploadContainer').classList.add('ring-2', 'ring-pink-500', 'bg-gray-700');
            document.querySelector('#audioUploadContainer span').textContent = file.name;
            document.getElementById('removeAudioBtn').classList.remove('hidden'); document.getElementById('removeAudioBtn').classList.add('flex');
            audioInput.value = '';
        });

        document.getElementById('removeAudioBtn').addEventListener('click', (e) => {
            e.preventDefault(); e.stopPropagation();
            if (backgroundAudio) { URL.revokeObjectURL(backgroundAudio.url); backgroundAudio = null; }
            document.getElementById('audioUploadContainer').classList.remove('ring-2', 'ring-pink-500', 'bg-gray-700');
            document.querySelector('#audioUploadContainer span').textContent = 'موسيقى خارجية';
            document.getElementById('removeAudioBtn').classList.add('hidden'); document.getElementById('removeAudioBtn').classList.remove('flex');
        });

        // واجهة المخطط الزمني
        function renderTimelineUI() {
            timelineContainer.innerHTML = '';
            if (timeline.length === 0) {
                timelineContainer.appendChild(emptyTimelineMsg);
                emptyTimelineMsg.style.display = 'block'; emptyStateMsg.style.display = 'flex';
                ctx.clearRect(0,0, defaultWidth, defaultHeight); return;
            }
            emptyTimelineMsg.style.display = 'none'; emptyStateMsg.style.display = 'none';

            timeline.forEach((item, index) => {
                const el = document.createElement('div');
                el.className = `clip-item bg-gray-700 rounded-lg p-2 flex items-center gap-2 relative overflow-hidden group ${editingIndex === index ? 'active' : ''}`;
                
                // النقر على جسم المقطع يفتح نافذة الإعدادات الكاملة
                el.onclick = () => openClipSettings(index);
                
                const iconHTML = item.type === 'video' ? '<i class="fa-solid fa-video text-blue-400"></i>' : '<i class="fa-solid fa-image text-emerald-400"></i>';
                const thumb = document.createElement('div');
                thumb.className = "w-16 h-12 bg-black rounded shrink-0 flex items-center justify-center overflow-hidden relative";
                if(item.type === 'image') {
                    const imgThumb = document.createElement('img'); imgThumb.src = item.url;
                    // إظهار التدوير في الصورة المصغرة للتوضيح
                    imgThumb.style.transform = `rotate(${item.rotation || 0}deg)`;
                    imgThumb.className = "w-full h-full object-cover opacity-80 transition-transform"; 
                    thumb.appendChild(imgThumb);
                } else { thumb.innerHTML = `<i class="fa-solid fa-film text-gray-500 text-sm"></i>`; }

                const details = document.createElement('div');
                details.className = "flex-grow min-w-0 pointer-events-none";
                
                // إظهار حالة وضع العرض كنص صغير
                let modeText = item.fitMode === 'cover' ? 'قص' : (item.fitMode === 'contain' ? 'احتواء' : 'تمطيط');
                details.innerHTML = `<h4 class="text-xs font-bold truncate">${item.name}</h4><p class="text-[10px] text-gray-400">${formatTime(item.duration)} • ${modeText}</p>`;
                
                const iconDiv = document.createElement('div'); iconDiv.className = "w-5 flex items-center justify-center pointer-events-none"; iconDiv.innerHTML = iconHTML;

                // --- الأزرار السريعة الجديدة ---
                const actionsDiv = document.createElement('div');
                actionsDiv.className = "flex items-center gap-1 opacity-100 lg:opacity-0 group-hover:opacity-100 transition z-10 shrink-0";

                // زر التبديل بين أوضاع العرض (Fit Toggle)
                const fitBtn = document.createElement('button');
                let fitIconClass = item.fitMode === 'cover' ? 'fa-crop-simple' : (item.fitMode === 'contain' ? 'fa-compress' : 'fa-arrows-left-right');
                fitBtn.className = "w-7 h-7 bg-gray-600 hover:bg-gray-500 rounded text-blue-400 flex items-center justify-center transition";
                fitBtn.title = "تغيير الأبعاد (قص، احتواء، تمطيط)";
                fitBtn.innerHTML = `<i class="fa-solid ${fitIconClass}"></i>`;
                fitBtn.onclick = (e) => {
                    e.stopPropagation();
                    // التبديل بين الحالات الثلاث
                    if (item.fitMode === 'cover') item.fitMode = 'contain';
                    else if (item.fitMode === 'contain') item.fitMode = 'stretch';
                    else item.fitMode = 'cover';
                    
                    if (editingIndex === index) redrawCurrentOrFirst();
                    renderTimelineUI();
                };

                // زر التدوير (Rotate)
                const rotateBtn = document.createElement('button');
                rotateBtn.className = "w-7 h-7 bg-gray-600 hover:bg-gray-500 rounded text-yellow-400 flex items-center justify-center transition";
                rotateBtn.title = "تدوير 90 درجة";
                rotateBtn.innerHTML = '<i class="fa-solid fa-rotate-right"></i>';
                rotateBtn.onclick = (e) => {
                    e.stopPropagation();
                    item.rotation = ((item.rotation || 0) + 90) % 360;
                    if (editingIndex === index) redrawCurrentOrFirst();
                    renderTimelineUI();
                };

                // زر الحذف السريع (X)
                const delBtn = document.createElement('button');
                delBtn.className = "w-7 h-7 bg-red-600/80 hover:bg-red-500 rounded text-white flex items-center justify-center transition ml-1";
                delBtn.title = "حذف";
                delBtn.innerHTML = '<i class="fa-solid fa-xmark text-lg"></i>';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    if(!timeline[index].name.includes("صفحة")) URL.revokeObjectURL(timeline[index].url); 
                    timeline.splice(index, 1);
                    
                    // تحديث مؤشر التعديل لكي لا يتعطل الرسم إذا تم حذف العنصر المعروض حالياً
                    if (editingIndex === index) {
                        editingIndex = timeline.length > 0 ? Math.max(0, index - 1) : -1;
                        redrawCurrentOrFirst();
                    } else if (editingIndex > index) {
                        editingIndex--;
                    }
                    
                    if(timeline.length === 0) {
                        ctx.fillStyle = '#000'; ctx.fillRect(0,0,defaultWidth,defaultHeight);
                        emptyStateMsg.style.display = 'flex';
                    }
                    renderTimelineUI();
                };

                actionsDiv.appendChild(fitBtn);
                actionsDiv.appendChild(rotateBtn);
                actionsDiv.appendChild(delBtn);

                el.appendChild(thumb); el.appendChild(iconDiv); el.appendChild(details); el.appendChild(actionsDiv);
                timelineContainer.appendChild(el);
            });
        }

        // إعدادات المقطع (Modal)
        function openClipSettings(index) {
            if (isPlaying) stopPlayback();
            editingIndex = index; const item = timeline[index];
            redrawCurrentOrFirst(); renderTimelineUI(); 
            clipFitRadios.forEach(r => r.checked = (r.value === item.fitMode));
            clipZoomInput.value = item.scale; zoomValueDisplay.textContent = Math.round(item.scale * 100) + '%';
            if (item.type === 'image') { durationControlGroup.style.display = 'block'; clipDurationInput.value = item.duration; } 
            else { durationControlGroup.style.display = 'none'; }
            modal.classList.remove('hidden'); modal.classList.add('flex');
        }

        function closeSettingsModal() { modal.classList.add('hidden'); modal.classList.remove('flex'); renderTimelineUI(); }

        clipFitRadios.forEach(radio => { radio.addEventListener('change', (e) => { if(editingIndex >= 0) { timeline[editingIndex].fitMode = e.target.value; redrawCurrentOrFirst(); } }); });
        clipZoomInput.addEventListener('input', (e) => { if(editingIndex >= 0) { timeline[editingIndex].scale = parseFloat(e.target.value); zoomValueDisplay.textContent = Math.round(timeline[editingIndex].scale * 100) + '%'; redrawCurrentOrFirst(); } });
        clipRotateBtn.addEventListener('click', () => { if(editingIndex >= 0) { timeline[editingIndex].rotation = ((timeline[editingIndex].rotation || 0) + 90) % 360; redrawCurrentOrFirst(); } });
        clipDurationInput.addEventListener('change', (e) => { if(editingIndex >= 0 && timeline[editingIndex].type === 'image') { let val = parseFloat(e.target.value); if (val > 0) timeline[editingIndex].duration = val; } });
        
        // رز التدوير الذكي (اليدوي) داخل النافذة
        clipAutoRotateBtn.addEventListener('click', async () => {
            if(editingIndex >= 0) {
                const item = timeline[editingIndex];
                if (item.type !== 'image') { alert('التدوير الذكي للنصوص مدعوم للصور والـ PDF فقط.'); return; }
                
                const btnIcon = clipAutoRotateBtn.querySelector('i');
                btnIcon.className = "fa-solid fa-spinner fa-spin";
                
                const rot = await getSmartRotation(item.element);
                if (rot !== 0) {
                    // إضافة التدوير المقترح للتدوير الحالي لضبط الاتجاه
                    item.rotation = rot;
                    redrawCurrentOrFirst();
                } else {
                    alert("إما أن اتجاه الصورة صحيح بالفعل، أو لم يجد الذكاء الاصطناعي نصاً كافياً لتحليل الاتجاه.");
                }
                
                btnIcon.className = "fa-solid fa-wand-magic-sparkles";
            }
        });

        deleteClipBtn.addEventListener('click', () => {
            if(editingIndex >= 0) {
                if(!timeline[editingIndex].name.includes("صفحة")) URL.revokeObjectURL(timeline[editingIndex].url); 
                timeline.splice(editingIndex, 1);
                editingIndex = timeline.length > 0 ? timeline.length -1 : -1; 
                closeSettingsModal();
                redrawCurrentOrFirst();
                if(timeline.length === 0) emptyStateMsg.style.display = 'flex';
            }
        });
        closeModalBtn.addEventListener('click', closeSettingsModal); saveModalBtn.addEventListener('click', closeSettingsModal);

        // التشغيل والتصدير
        function playTimelineItem(item, exportMode = false) {
            return new Promise(async (resolve) => {
                if (!isPlaying) return resolve();
                editingIndex = timeline.indexOf(item);
                highlightTimelineItem(editingIndex);

                let startTime = performance.now();
                const audioMode = getAudioMode();
                
                const checkAndDrawFrame = () => {
                    if (!isPlaying) return resolve();
                    const elapsedSec = (performance.now() - startTime) / 1000;
                    
                    if (elapsedSec >= item.duration) {
                        if (item.type === 'video') item.element.pause();
                        return resolve();
                    }
                    
                    drawMedia(ctx, item, defaultWidth, defaultHeight);
                    currentAnimationId = requestAnimationFrame(checkAndDrawFrame);
                };

                if (item.type === 'image') {
                    currentAnimationId = requestAnimationFrame(checkAndDrawFrame);
                } else if (item.type === 'video') {
                    const vid = item.element; vid.currentTime = 0;
                    if (audioMode === 'musicOnly') vid.muted = true;
                    else if (audioMode === 'mix') {
                        vid.muted = false;
                        if (exportMode && audioCtx && !vid.muted) {
                            try {
                                if (!vid._hasAudioNode) {
                                    const sourceNode = audioCtx.createMediaElementSource(vid);
                                    sourceNode.connect(destStream); sourceNode.connect(audioCtx.destination); 
                                    vid._hasAudioNode = sourceNode;
                                }
                            } catch(e) {}
                        }
                    }
                    try { await vid.play(); } catch(err) { return resolve(); }
                    currentAnimationId = requestAnimationFrame(checkAndDrawFrame);
                }
            });
        }

        async function startPlayback(exportMode = false) {
            if (timeline.length === 0) return;
            initAudioSystem();
            if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();
            
            isPlaying = true; toggleButtons(true);
            let totalDuration = timeline.reduce((sum, item) => sum + item.duration, 0);
            let playbackStartTime = performance.now();

            if (exportMode) {
                processingUI.classList.remove('hidden'); processingUI.classList.add('flex');
                doneUI.classList.add('hidden'); doneUI.classList.remove('flex');
                exportOverlay.classList.remove('hidden'); exportOverlay.classList.add('flex');
                exportProgressBar.style.width = '0%'; exportProgressText.innerText = '0%';
                
                const canvasStream = canvas.captureStream(30);
                const tracks = [canvasStream.getVideoTracks()[0]];
                if (audioCtx && destStream) tracks.push(destStream.stream.getAudioTracks()[0]);
                
                const combinedStream = new MediaStream(tracks); exportChunks = [];
                let mime = MediaRecorder.isTypeSupported('video/mp4') ? 'video/mp4' : 'video/webm; codecs=vp8,opus';
                try { exportMediaRecorder = new MediaRecorder(combinedStream, { mimeType: mime }); } 
                catch(e) { exportMediaRecorder = new MediaRecorder(combinedStream); }
                
                exportMediaRecorder.ondataavailable = e => { if (e.data.size > 0) exportChunks.push(e.data); };
                exportMediaRecorder.onstop = finalizeExport;
                exportMediaRecorder.start(100); 
            }

            if (backgroundAudio) {
                backgroundAudio.element.currentTime = 0; backgroundAudio.element.volume = 1.0; 
                if (exportMode && audioCtx) {
                     try {
                        if (!backgroundAudio.element._hasAudioNode) {
                            const bgAudioSource = audioCtx.createMediaElementSource(backgroundAudio.element);
                            bgAudioSource.connect(destStream); bgAudioSource.connect(audioCtx.destination);
                            backgroundAudio.element._hasAudioNode = bgAudioSource;
                        }
                    } catch(e) {}
                }
                backgroundAudio.element.play();
            }

            const uiTimer = setInterval(() => {
                if(!isPlaying) { clearInterval(uiTimer); return; }
                let elapsedSec = (performance.now() - playbackStartTime) / 1000;
                
                if (exportMode) {
                    let percent = Math.min(100, Math.floor((elapsedSec / totalDuration) * 100));
                    exportProgressBar.style.width = percent + '%'; exportProgressText.innerText = percent + '%';
                }
                timeDisplay.textContent = formatTime(Math.floor(elapsedSec));
                
                if (elapsedSec > totalDuration + 0.5 && isExporting) { clearInterval(uiTimer); stopPlayback(); }
            }, 100);

            for (let i = 0; i < timeline.length; i++) {
                if (!isPlaying) break;
                await playTimelineItem(timeline[i], exportMode);
            }

            if (backgroundAudio) backgroundAudio.element.pause();
            if (exportMode && isPlaying) {
                if (exportMediaRecorder && exportMediaRecorder.state !== 'inactive') exportMediaRecorder.stop();
            } else { stopPlayback(); }
        }

        function stopPlayback() {
            isPlaying = false; toggleButtons(false);
            if (currentAnimationId) cancelAnimationFrame(currentAnimationId);
            if (backgroundAudio) backgroundAudio.element.pause();
            timeline.forEach(item => { if(item.type === 'video') item.element.pause(); });
            
            if (isExporting && exportMediaRecorder && exportMediaRecorder.state !== 'inactive') exportMediaRecorder.stop(); 
            else exportOverlay.classList.add('hidden'); exportOverlay.classList.remove('flex');
            
            isExporting = false; timeDisplay.textContent = "00:00";
            removeHighlight(); redrawCurrentOrFirst();
        }

        function finalizeExport() {
            stopPlayback();
            if (exportChunks.length === 0) { exportOverlay.classList.add('hidden'); return; }
            
            let type = exportMediaRecorder.mimeType.includes('mp4') ? 'video/mp4' : 'video/webm';
            finalVideoExt = type === 'video/mp4' ? 'mp4' : 'webm';
            finalVideoBlob = new Blob(exportChunks, { type: type });
            
            processingUI.classList.add('hidden'); processingUI.classList.remove('flex');
            doneUI.classList.remove('hidden'); doneUI.classList.add('flex');
            exportOverlay.classList.remove('hidden'); exportOverlay.classList.add('flex');

            try {
                const file = new File([finalVideoBlob], `Video_${Date.now()}.${finalVideoExt}`, { type: type });
                if (navigator.canShare && navigator.canShare({ files: [file] })) finalShareBtn.classList.remove('hidden');
            } catch (e) {}
        }

        function toggleButtons(playing) {
            if (playing) { playBtn.classList.add('hidden'); stopBtn.classList.remove('hidden'); exportBtn.disabled = true; exportBtn.classList.add('opacity-50'); } 
            else { playBtn.classList.remove('hidden'); stopBtn.classList.add('hidden'); exportBtn.disabled = false; exportBtn.classList.remove('opacity-50'); }
        }

        function highlightTimelineItem(index) {
            const items = document.querySelectorAll('.clip-item');
            items.forEach((item, i) => {
                if(i === index) { item.classList.add('active'); item.style.borderColor = '#6366f1'; }
                else { item.classList.remove('active'); item.style.borderColor = 'transparent'; }
            });
            if (items[index]) items[index].scrollIntoView({ behavior: "smooth", block: "nearest" });
        }
        function removeHighlight() { renderTimelineUI(); }

        playBtn.addEventListener('click', () => startPlayback(false));
        stopBtn.addEventListener('click', stopPlayback);
        exportBtn.addEventListener('click', () => { if (timeline.length === 0) return; isExporting = true; startPlayback(true); });

        finalDownloadBtn.addEventListener('click', () => {
            if (!finalVideoBlob) return;
            const url = URL.createObjectURL(finalVideoBlob); const a = document.createElement('a'); a.style.display = 'none';
            a.href = url; a.download = `Edited_Video_${Date.now()}.${finalVideoExt}`; document.body.appendChild(a); a.click();
            setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
        });

        finalShareBtn.addEventListener('click', async () => {
            if (!finalVideoBlob) return;
            const file = new File([finalVideoBlob], `Edited_Video_${Date.now()}.${finalVideoExt}`, { type: finalVideoBlob.type });
            try { await navigator.share({ title: 'فيديو جديد', text: 'شاهد هذا الفيديو!', files: [file] }); } catch (err) { }
        });

        finalCloseBtn.addEventListener('click', () => { exportOverlay.classList.add('hidden'); exportOverlay.classList.remove('flex'); });

        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, defaultWidth, defaultHeight);

    </script>
</body>
</html>
